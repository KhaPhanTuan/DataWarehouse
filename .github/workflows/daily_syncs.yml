name: Daily Stock Data Ingestion Pipeline

on:
  schedule:
    # 09:00 UTC = 16:00 chiều giờ Việt Nam (GMT+7)
    - cron: '0 9 * * *'
  
  # LỆNH QUAN TRỌNG: Kích hoạt nút bấm "Run workflow" thủ công trên GitHub để test
  workflow_dispatch:

jobs:
  ingest_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install vnstock pandas duckdb==1.5.2

    - name: Execute Data Ingestion Script
      env:
        VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      run: |
        python ingest.py
