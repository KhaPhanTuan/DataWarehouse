name: VN Stock Daily Automated ML Pipeline

on:
  schedule:
    # Tự động kích hoạt vào lúc 6:00 sáng Thứ 3 đến Thứ 7 hằng tuần (theo giờ Việt Nam = 23:00 UTC hôm trước)
    - cron: '0 23 * * 1-5'
  workflow_dispatch: # Cho phép bấm nút kích hoạt chạy thủ công trên giao diện GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn scikit-image joblib requests vnstock
        pip install duckdb==1.5.3
        pip install dbt-core dbt-duckdb==1.5.3

    # tự động quét mã động từ Cloud và cào dữ liệu thô mới nhất
    - name: Execute Data Ingestion (Bronze Layer)
      env:
        VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      run: python ingest.py

    #  dbt vòng 1 để làm sạch data
    - name: Execute dbt Transform (Round 1 - Full Refresh)
      env:
        MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      run: |
        dbt deps
        dbt run --full-refresh --profiles-dir .

    # Bật quét tin tức mới và tự động chấm điểm
    - name: Execute AI Sentiment Inference (Intelligence Layer)
      env:
        MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: python models/sentiment/run_inference.py

    #Chạy dbt vòng cuối để map toàn bộ nhãn AI vào bảng phẳng
    - name: Execute dbt Transform (Final Round)
      env:
        MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      run: dbt run --profiles-dir .